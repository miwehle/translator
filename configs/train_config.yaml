dataset_path: /content/drive/MyDrive/nmt_lab/artifacts/datasets/europarl_de-en_train_10000

model_config:
  d_model: 256
  ff_dim: 1024
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  max_seq_len: 1024
  attention: torch

train_config:
  runs_dir: /content/drive/MyDrive/nmt_lab/artifacts/training_runs
  run_name: run1
  seed: 42
  lr: 0.0003
  epochs: 1
  log_every: 50
  translate_every: 500
  translate_examples:
    - We need a clear plan for the next step.
    - The committee approved the proposal yesterday.
    - This agreement will strengthen cooperation between our countries.
    - The morning light fell softly across the flower meadow.
    - She smiled as the first notes of the song filled the room.
  spike_window: 100
  spike_factor: 3.0

data_loader_config:
  batch_size: 64
  shuffle: true
  num_workers: 0
  prefetch_factor: null
  persistent_workers: null
  pin_memory: null
